<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Terminal — Reels Factory</title>
  <link rel="stylesheet" href="/css/studio.css">
  <link rel="stylesheet" href="/css/dark-theme.css">
  <link rel="stylesheet" href="/vendor/xterm/xterm/css/xterm.css">
  <style>
    html, body { height: 100%; margin: 0; background: #0a0a14; color: #d8dee9; }
    .detached-terminal {
      display: flex; flex-direction: column;
      height: 100vh; width: 100vw;
    }
    .detached-terminal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      background: #15151f;
      border-bottom: 1px solid #2a2a3a;
    }
    .detached-terminal-header .terminal-title { color: #ff6b00; font-weight: 700; font-size: 13px; }
    .detached-terminal-body {
      flex: 1; padding: 8px; min-height: 0;
    }
    .detached-terminal-body .xterm { height: 100%; }
  </style>
</head>
<body>
  <div class="detached-terminal">
    <div class="detached-terminal-header">
      <span class="terminal-title">💻 Terminal (отдельное окно)</span>
      <select class="terminal-backend-select" id="detached-backend-select" title="Выбор AI-CLI"></select>
      <span class="terminal-status" id="detached-status"></span>
      <div style="flex: 1"></div>
      <button type="button" class="terminal-btn" id="detached-restart" title="Перезапустить">↻</button>
      <button type="button" class="terminal-btn" id="detached-clear" title="Очистить">🗑</button>
    </div>
    <div class="detached-terminal-body" id="detached-terminal-host"></div>
    <div class="terminal-voice-bar">
      <textarea
        id="detached-voice-input"
        class="terminal-voice-input"
        rows="1"
        placeholder="🎙 Поле для голосового ввода (Wispr Flow) — Enter отправит в AI-CLI"
        autocomplete="off"
        spellcheck="false"></textarea>
      <button type="button" id="detached-voice-send" class="terminal-btn terminal-voice-send" title="Отправить (Enter)">➤</button>
    </div>
  </div>

  <script src="/vendor/xterm/xterm/lib/xterm.js"></script>
  <script src="/vendor/xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="/vendor/xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="/js/terminal-window.js"></script>
</body>
</html>
