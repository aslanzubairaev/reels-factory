<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Factory Studio</title>
  <link rel="stylesheet" href="/css/studio.css">
  <link rel="stylesheet" href="/css/dark-theme.css" id="theme-dark">
  <link rel="stylesheet" href="/css/light-theme.css" id="theme-light" disabled>
</head>
<body>

  <!-- Экран настроек -->
  <div id="settings-screen">
    <div class="settings-card">
      <h1>Reels Factory Studio</h1>
      <p class="subtitle">Настройте сессию записи</p>

      <div class="form-group">
        <label>Проект</label>
        <select id="project-select"></select>
      </div>

      <div class="form-group">
        <label>Камера</label>
        <select id="camera-select"></select>
      </div>

      <div class="form-group">
        <label>Микрофон</label>
        <select id="mic-select"></select>
      </div>

      <div class="form-group">
        <label>Качество записи</label>
        <select id="quality-select">
          <option value="1080p">1080p (1080x1920)</option>
          <option value="720p">720p (720x1280)</option>
        </select>
      </div>

      <button id="enter-studio-btn" class="btn btn-primary">Войти в студию</button>
    </div>
  </div>

  <!-- Загрузка -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div id="loading-text">Загрузка...</div>
  </div>

  <!-- Режим Preview -->
  <div id="preview-screen" class="hidden">
    <div class="preview-left">
      <div class="phone-frame" id="phone-frame">
        <div id="bg-container"></div>
        <canvas id="preview-segmentation-canvas" class="preview-seg-canvas hidden"></canvas>
        <div id="camera-window" class="camera-window layout-face_only cam-pos-center">
          <video id="camera-video" autoplay playsinline muted></video>
        </div>
      </div>
      <!-- Управление камерой -->
      <div class="camera-controls">
        <div class="camera-controls-row">
          <div class="zoom-control">
            <label>Размер</label>
            <input type="range" id="cam-size-slider" min="0.5" max="1.8" step="0.1" value="1">
            <span id="cam-size-value">1.0x</span>
          </div>
        </div>
        <div class="camera-controls-row">
          <div class="zoom-control">
            <label>Зум</label>
            <input type="range" id="zoom-slider" min="1" max="3" step="0.1" value="1">
            <span id="zoom-value">1.0x</span>
          </div>
        </div>
        <div class="camera-controls-row" id="cam-position-row">
          <label style="font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px">Позиция</label>
          <button class="btn btn-secondary btn-sm cam-pos-btn" data-pos="left">Слева</button>
          <button class="btn btn-secondary btn-sm cam-pos-btn active" data-pos="center">Центр</button>
          <button class="btn btn-secondary btn-sm cam-pos-btn" data-pos="right">Справа</button>
        </div>
        <div class="camera-controls-row">
          <button id="mirror-btn" class="btn btn-secondary btn-sm">Зеркало</button>
          <select id="camera-shape-select" class="shape-select">
            <option value="rounded-rect">Прямоугольник</option>
            <option value="circle">Круг</option>
          </select>
          <select id="transition-select" class="shape-select">
            <option value="fade">Fade</option>
            <option value="slide">Slide</option>
            <option value="zoom">Zoom</option>
            <option value="cut">Cut</option>
          </select>
        </div>
        <div class="camera-controls-row">
          <button id="bg-mode-btn" class="bg-mode-btn">С фоном</button>
          <button id="no-camera-btn" class="bg-mode-btn">Без меня</button>
          <select id="click-anim-select" class="shape-select">
            <option value="none">Клик: Выкл</option>
            <option value="pulse" selected>Клик: Пульс</option>
            <option value="rings">Клик: Кольца</option>
            <option value="spark">Клик: Искры</option>
            <option value="target">Клик: Фокус</option>
            <option value="glow">Клик: Свечение</option>
          </select>
          <button id="theme-toggle-btn" class="btn btn-secondary btn-sm theme-btn" title="Сменить тему">🌙 Тёмная</button>
        </div>
      </div>
    </div>

    <div class="preview-right">
      <!-- СВЕРХУ: Промпт фона -->
      <div class="panel-section">
        <h3>Промпт фона</h3>
        <textarea id="bg-prompt" placeholder="Промпт для генерации фона..."></textarea>
        <div class="prompt-actions">
          <button id="generate-btn" class="btn btn-secondary btn-sm">Сгенерировать</button>
          <button id="cancel-generate-btn" class="btn btn-danger btn-sm hidden">Отменить</button>
          <div id="generate-spinner" class="generate-spinner hidden">
            <div class="spinner-small"></div>
            <span>Генерация...</span>
          </div>
        </div>
      </div>

      <!-- ПОСЕРЕДИНЕ: Текст телепромптера -->
      <div class="panel-section teleprompter-panel">
        <h3>Текст сценария</h3>
        <div id="teleprompter-text" class="teleprompter-text-large"></div>
      </div>

      <!-- СНИЗУ: Информация и навигация -->
      <div class="panel-section">
        <div id="part-info" style="font-size:18px;font-weight:700;margin-bottom:6px">Часть 1 / 5</div>
        <div class="badges-row">
          <span id="layout-badge" class="badge badge-layout">FACE_ONLY</span>
          <span id="timing-badge" class="badge badge-time">7 СЕК</span>
          <span id="type-badge" class="badge badge-type">NONE</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="nav-bar">
          <button id="prev-btn" class="btn btn-secondary">Назад</button>
          <button id="next-btn" class="btn btn-secondary">Вперёд</button>
        </div>
        <div class="nav-hint">Стрелки: Влево / Вправо</div>
      </div>

      <button id="start-recording-btn" class="btn btn-record-start">Начать запись</button>
    </div>
  </div>

  <!-- Режим Recording -->
  <div id="recording-screen" class="hidden">
    <div class="rec-layout">
      <div class="rec-left">
        <div class="rec-canvas-wrapper">
          <canvas id="recording-canvas" width="1080" height="1920"></canvas>
          <video id="rec-preview-video" class="rec-preview-video hidden" controls playsinline></video>
          <div id="rec-countdown" class="rec-countdown hidden"></div>
          <div id="rec-indicator" class="rec-indicator">REC</div>
        </div>
      </div>

      <div class="rec-right">
        <div class="panel-section rec-status-bar">
          <div class="rec-status-left">
            <span id="rec-status-dot" class="rec-status-dot">●</span>
            <span id="rec-status-text">ГОТОВ</span>
            <span id="rec-part-info" class="rec-part-info">Часть 1 / 5</span>
          </div>
          <div id="rec-timer" class="rec-timer">00:00</div>
        </div>

        <div class="panel-section" style="padding:10px 20px">
          <div class="badges-row">
            <span id="rec-layout-badge" class="badge badge-layout">FACE_ONLY</span>
            <span id="rec-timing-badge" class="badge badge-time">7 СЕК</span>
          </div>
        </div>

        <div class="panel-section rec-teleprompter-panel">
          <h3>Телепромптер</h3>
          <div id="rec-teleprompter-scroll" class="rec-teleprompter-scroll">
            <div id="rec-teleprompter" class="rec-teleprompter-text"></div>
          </div>
          <div class="autoscroll-controls">
            <label>Автоскролл</label>
            <input type="range" id="scroll-speed" min="0" max="5" step="0.5" value="0">
            <span id="scroll-speed-value">Выкл</span>
            <button id="scroll-pause-btn" class="btn btn-secondary btn-sm">Пауза</button>
          </div>
        </div>

        <div class="panel-section">
          <div id="rec-next-preview" class="rec-next-preview"></div>
          <div class="auto-advance-row" style="margin-top:8px">
            <span>Режим</span>
            <button id="rec-mode-continuous-btn" class="btn btn-secondary btn-sm rec-mode-active">Целиком</button>
            <button id="rec-mode-perpart-btn" class="btn btn-secondary btn-sm">По слайдам</button>
          </div>
          <div class="auto-advance-row" style="margin-top:6px">
            <span>Автостоп</span>
            <button id="auto-stop-btn" class="btn btn-secondary btn-sm rec-mode-active">Авто: ВКЛ</button>
          </div>
        </div>

        <!-- Прогресс-бар (скрыт до начала записи) -->
        <div id="rec-progress-section" class="panel-section hidden" style="padding:10px 20px">
          <div class="progress-bar-container">
            <div id="rec-progress-bar" class="progress-bar"></div>
          </div>
          <div id="rec-progress-text" class="progress-text">0 / 0 сек</div>
        </div>

        <!-- Кнопки -->
        <div class="rec-controls">
          <!-- До записи: Запись -->
          <div id="rec-btns-ready" class="rec-btn-row">
            <button id="rec-start-btn" class="btn btn-rec-start" style="flex:1">Запись</button>
          </div>
          <!-- Навигация (всегда видна) -->
          <div class="rec-btn-row">
            <button id="rec-prev-btn-nav" class="btn btn-secondary">←</button>
            <span id="rec-slide-label" style="flex:2;text-align:center;color:var(--text-secondary);font-size:13px">Часть 1 / 7</span>
            <button id="rec-next-btn-nav" class="btn btn-secondary">→</button>
          </div>
          <!-- Во время записи: Стоп -->
          <div id="rec-btns-recording" class="rec-btn-row hidden">
            <button id="rec-stop-btn" class="btn btn-rec-stop" style="flex:1">Стоп</button>
          </div>
          <!-- После записи: Просмотр + Перезаписать + Сохранить -->
          <div id="rec-btns-done" class="rec-btn-row hidden">
            <button id="rec-preview-btn" class="btn btn-primary rec-done-btn">Просмотр</button>
            <button id="rec-rerecord-btn" class="btn btn-danger rec-done-btn">Перезаписать</button>
            <button id="rec-save-direct-btn" class="btn btn-record-start rec-done-btn">Сохранить</button>
          </div>
          <!-- Всегда: Назад -->
          <div class="rec-btn-row" style="margin-top:4px">
            <button id="rec-back-btn" class="btn btn-secondary" style="flex:1">Назад</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Просмотр записи -->
  <div id="review-screen" class="hidden">
    <div class="review-layout">
      <div class="review-video-wrapper">
        <video id="review-video" controls></video>
      </div>
      <div class="review-controls">
        <button id="review-play-btn" class="btn btn-primary">Воспроизвести</button>
        <button id="review-save-btn" class="btn btn-record-start">Сохранить</button>
        <button id="review-redo-btn" class="btn btn-secondary">Перезаписать</button>
      </div>
    </div>
  </div>

  <!-- Скрипты -->
  <script src="/js/api.js"></script>
  <script src="/js/camera.js"></script>
  <script src="/js/background.js"></script>
  <script src="/js/teleprompter.js"></script>
  <script src="/js/hotkeys.js"></script>
  <script src="/js/translate.js"></script>
  <script src="/js/segmentation.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/recorder.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
