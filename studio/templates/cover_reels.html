<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: "Bebas Neue";
        src: url("BebasNeue-Regular.ttf");
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }

      .cover {
        width: 1080px;
        height: 1920px;
        position: relative;
        background: #0a0a14;
        overflow: hidden;
      }

      /* Фон */
      .bg-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Фото — КРУПНОЕ, по центру, снизу */
      .person-photo {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        height: 88%;
        width: auto;
        object-fit: contain;
        object-position: bottom center;
        z-index: 10;
        /* Мягкое растворение краёв в фон */
        mask-image:
          linear-gradient(
            to bottom,
            transparent 0%,
            black 8%,
            black 85%,
            transparent 100%
          ),
          linear-gradient(
            to right,
            transparent 0%,
            black 10%,
            black 90%,
            transparent 100%
          );
        mask-composite: intersect;
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 8%,
          black 85%,
          transparent 100%
        );
      }

      /* Затемнение снизу для текста */
      .gradient-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(8, 8, 16, 0.3) 25%,
          rgba(8, 8, 16, 0.65) 50%,
          rgba(8, 8, 16, 0.85) 75%,
          rgba(8, 8, 16, 0.95) 100%
        );
        z-index: 15;
      }

      /* Текст — две строки, позиция зависит от фото */
      .text-block {
        position: absolute;
        bottom: 420px;
        left: 30px;
        right: 30px;
        z-index: 20;
        text-align: center;
        white-space: normal;
      }

      .text-line {
        font-family: "Bebas Neue", "Impact", sans-serif;
        text-transform: uppercase;
        letter-spacing: 5px;
        line-height: 1;
      }

      .text-white {
        color: #ffffff;
        font-size: 78px;
        text-shadow:
          3px 3px 8px rgba(0, 0, 0, 0.95),
          0 0 25px rgba(0, 0, 0, 0.6);
      }

      .text-orange {
        color: #ff6b00;
        font-size: 78px;
        text-shadow:
          3px 3px 8px rgba(0, 0, 0, 0.95),
          0 0 15px rgba(255, 107, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="cover">
      <img class="bg-image" src="cover_background.png" alt="" />
      <img
        class="person-photo"
        src="{{PHOTO}}"
        alt=""
        style="display: {{PHOTO_DISPLAY}};"
      />
      <div class="gradient-bottom"></div>
      <div class="text-block">
        <div class="text-line text-white">{{TEXT_WHITE}}</div>
        <div class="text-line text-orange">{{TEXT_ORANGE}}</div>
      </div>
    </div>
  </body>
</html>
