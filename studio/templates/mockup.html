<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
  font-family: 'Inter', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  /* Instagram safe zones: top 8%, right 15%, bottom 30% for description+camera */
  padding: 150px 160px 570px 60px;
}
.mockup-window {
  background: #1e1e2e;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
.window-bar {
  background: #2a2a3e;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.window-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
}
.dot-red { background: #ff5f57; }
.dot-yellow { background: #febc2e; }
.dot-green { background: #28c840; }
.window-title {
  flex: 1;
  text-align: center;
  font-size: 20px;
  color: rgba(255,255,255,0.5);
  font-family: 'JetBrains Mono', monospace;
}
.mockup-content {
  padding: 40px;
}
.mockup-title {
  font-size: 44px;
  font-weight: 900;
  margin-bottom: 36px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.mockup-table {
  width: 100%;
  border-collapse: collapse;
}
.mockup-table th {
  text-align: left;
  font-size: 22px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.mockup-table td {
  font-size: 28px;
  padding: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.mockup-table tr:last-child td {
  border-bottom: none;
}
.status-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 20px;
  font-weight: 600;
}
.status-green { background: rgba(34,197,94,0.2); color: #22c55e; }
.status-red { background: rgba(239,68,68,0.2); color: #ef4444; }
.status-yellow { background: rgba(234,179,8,0.2); color: #eab308; }
.status-blue { background: rgba(59,130,246,0.2); color: #3b82f6; }
</style>
</head>
<body>
  <div class="mockup-window">
    <div class="window-bar">
      <div class="window-dot dot-red"></div>
      <div class="window-dot dot-yellow"></div>
      <div class="window-dot dot-green"></div>
      <div class="window-title" id="window-title">Dashboard</div>
    </div>
    <div class="mockup-content">
      <div class="mockup-title" id="mockup-title">{{title}}</div>
      <table class="mockup-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const data = window.__SLIDE_DATA__ || {};
    if (data.title) document.getElementById('mockup-title').textContent = data.title;
    if (data.window_title) document.getElementById('window-title').textContent = data.window_title;

    const columns = data.columns || [];
    const rows = data.rows || [];

    if (columns.length) {
      const headRow = document.createElement('tr');
      columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headRow.appendChild(th);
      });
      document.getElementById('table-head').appendChild(headRow);
    }

    const tbody = document.getElementById('table-body');
    rows.forEach(row => {
      const tr = document.createElement('tr');
      (row.cells || []).forEach(cell => {
        const td = document.createElement('td');
        if (cell.status) {
          td.innerHTML = `<span class="status-badge status-${cell.status}">${cell.text || ''}</span>`;
        } else {
          td.textContent = cell.text || cell;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
