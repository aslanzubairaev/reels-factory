<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
  font-family: 'Inter', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 100px 80px;
}
.main-text {
  font-size: 72px;
  font-weight: 900;
  text-align: center;
  line-height: 1.3;
  max-width: 920px;
}
.subtitle {
  font-size: 36px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  text-align: center;
  margin-top: 48px;
  line-height: 1.4;
  max-width: 800px;
}
.accent {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.divider {
  width: 120px;
  height: 4px;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 2px;
  margin-top: 40px;
}
</style>
</head>
<body>
  <div class="main-text" id="main-text">{{text}}</div>
  <div class="divider" id="divider"></div>
  <div class="subtitle" id="subtitle"></div>

  <script>
    const data = window.__SLIDE_DATA__ || {};
    const mainEl = document.getElementById('main-text');
    const subtitleEl = document.getElementById('subtitle');
    const dividerEl = document.getElementById('divider');

    if (data.text) {
      // Support **bold** as accent
      mainEl.innerHTML = data.text.replace(/\*\*(.*?)\*\*/g, '<span class="accent">$1</span>');
    }
    if (data.subtitle) {
      subtitleEl.textContent = data.subtitle;
    } else {
      subtitleEl.style.display = 'none';
      dividerEl.style.display = 'none';
    }
    if (data.font_size) {
      mainEl.style.fontSize = data.font_size + 'px';
    }
    if (data.color) {
      mainEl.style.color = data.color;
    }
  </script>
</body>
</html>
